<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock</title>
</head>
<body>
  <title> The clock</title>
 
  <h1>An analog clock</h1>
  <div class="clock">
    <div class="trace trace1">XII</div>
<div class="trace trace2">.</div>
<div class="trace trace3">.</div>
<div class="trace trace4 tracespecial">III</div>
<div class="trace trace5">.</div>
<div class="trace trace6">.</div>
<div class="trace trace7 tracespecial">VI</div>
<div class="trace trace8">.</div>
<div class="trace trace9">.</div>
<div class="trace trace10 tracespecial">IX</div>
<div class="trace trace11">.</div>
<div class="trace trace12">.</div>
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="hand second"></div>
    <div class="center"></div>
  </div>
  <div class="time-container">
  <div class="time"></div>
    <div class="date"><span class="day"></span></div>
  </div>
  
</body>
